{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
{% endblock %}

{% block content %}
<main class="chat-layout">
  {% block chat_content %}{% endblock %}
</main>
{% endblock %}

{% block extra_js %}
<script>
    window.APP_CONFIG = {
        isAuthenticated: "{{ request.user.is_authenticated }}" === "True"
    };
</script>
<script type="module" src="{% static 'js/main.js' %}"></script>

{% endblock %}
